<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Concreta — Crear Perfil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="setup-page">

  <div class="setup-card">
    <div class="setup-header">
      <div class="setup-logo">🏗️</div>
      <h2>¡Bienvenido al equipo!</h2>
      <p style="font-size:0.875rem;color:var(--text-muted);margin-top:0.5rem;">
        Antes de comenzar, crea tu perfil de vendedor. Esta información será visible para el equipo y el jefe.
      </p>
    </div>

    <div id="setupError" class="alert alert-error hidden">
      ⚠️ Por favor completa todos los campos obligatorios.
    </div>

    <!-- Photo Upload -->
    <label class="photo-upload-area" for="photoInput" id="photoArea">
      <div class="photo-preview" id="photoPreview">
        <span id="photoPlaceholderIcon">📷</span>
      </div>
      <div class="photo-upload-label">
        <!-- [IMAGE: Ícono de cámara o persona genérica para representar foto de perfil del vendedor] -->
        <strong>Sube tu foto de perfil</strong><br>
        <span>JPG o PNG · máx. 2 MB</span>
      </div>
      <input type="file" id="photoInput" accept="image/*">
    </label>

    <form id="profileForm" novalidate>

      <div class="form-row">
        <div class="form-group">
          <label>Nombre(s) <span style="color:var(--rose)">*</span></label>
          <input type="text" id="firstName" placeholder="Juan Pablo" required>
        </div>
        <div class="form-group">
          <label>Apellido(s) <span style="color:var(--rose)">*</span></label>
          <input type="text" id="lastName" placeholder="De la Garza" required>
        </div>
      </div>

      <div class="form-group">
        <label>Teléfono celular <span style="color:var(--rose)">*</span></label>
        <div class="input-icon-wrap">
          <span class="input-icon">📱</span>
          <input type="tel" id="phone" placeholder="81 1234 5678" required>
        </div>
      </div>

      <div class="form-group">
        <label>Correo electrónico <span style="color:var(--rose)">*</span></label>
        <div class="input-icon-wrap">
          <span class="input-icon">✉️</span>
          <input type="email" id="email" placeholder="tu@correo.com" required>
        </div>
      </div>

      <div class="form-group">
        <label>Zona asignada</label>
        <select id="zona">
          <option value="">Selecciona tu zona principal</option>
          <option>Apodaca</option>
          <option>García</option>
          <option>Ciénega de Flores</option>
          <option>Escobedo</option>
          <option>Monterrey Norte</option>
          <option>San Nicolás</option>
          <option>Otra</option>
        </select>
      </div>

      <div class="form-group">
        <label>Años de experiencia en ventas</label>
        <select id="experiencia">
          <option value="0">Menos de 1 año</option>
          <option value="1">1 – 2 años</option>
          <option value="3">3 – 5 años</option>
          <option value="5">Más de 5 años</option>
        </select>
      </div>

      <div class="form-group">
        <label>Algo sobre ti (opcional)</label>
        <textarea id="bio" placeholder="Cuéntanos un poco sobre ti, tu motivación o tu estilo de trabajo…"></textarea>
      </div>

      <button type="submit" class="btn btn-primary btn-full btn-lg" id="saveBtn">
        Guardar perfil y comenzar →
      </button>

    </form>
  </div>

  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script>
    /* Must be an employee session */
    const sess = getSession();
    if (!sess || sess.role !== 'employee') {
      window.location.href = 'index.html';
    }

    let photoDataURL = null;

    /* Photo preview */
    document.getElementById('photoInput').addEventListener('change', function() {
      const file = this.files[0];
      if (!file) return;
      if (file.size > 2 * 1024 * 1024) {
        alert('La imagen no puede superar 2 MB.');
        return;
      }
      const reader = new FileReader();
      reader.onload = function(e) {
        photoDataURL = e.target.result;
        const preview = document.getElementById('photoPreview');
        preview.innerHTML = `<img src="${photoDataURL}" alt="Foto">`;
      };
      reader.readAsDataURL(file);
    });

    document.getElementById('profileForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const firstName  = document.getElementById('firstName').value.trim();
      const lastName   = document.getElementById('lastName').value.trim();
      const phone      = document.getElementById('phone').value.trim();
      const email      = document.getElementById('email').value.trim();
      const zona       = document.getElementById('zona').value;
      const exp        = document.getElementById('experiencia').value;
      const bio        = document.getElementById('bio').value.trim();
      const errEl      = document.getElementById('setupError');

      if (!firstName || !lastName || !phone || !email) {
        errEl.classList.remove('hidden');
        return;
      }

      errEl.classList.add('hidden');
      document.getElementById('saveBtn').textContent = 'Guardando…';

      updateUser(sess.userId, {
        name: `${firstName} ${lastName}`,
        phone,
        email,
        zona,
        experiencia: exp,
        bio,
        photo: photoDataURL,
        profileCreated: true,
        joinDate: new Date().toISOString()
      });

      showToast('success', '¡Perfil creado!', 'Bienvenido al equipo de Concreta.');
      setTimeout(() => { window.location.href = 'employee.html'; }, 800);
    });
  </script>
</body>
</html>
